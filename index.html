<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --green: #34d399;
    --green-dim: #064e3b;
    --red: #f87171;
    --red-dim: #450a0a;
    --yellow: #fbbf24;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --input-bg: #1a1a22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,58,237,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(52,211,153,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  .header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-tag {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }

  /* Month selector */
  .month-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .month-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    flex: 1;
  }
  .month-bar select:focus { outline: none; border-color: var(--accent); }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: #22222c; }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .section-total {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .section-body { padding: 16px 20px; }

  /* Input rows */
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .input-row:last-child { margin-bottom: 0; }
  .input-label {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }
  .input-label .emoji { margin-right: 6px; }
  .input-label .sublabel {
    display: block;
    font-size: 10px;
    color: #44445a;
    margin-top: 1px;
